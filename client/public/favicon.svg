<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <circle cx="24" cy="24" r="24" fill="#F97316"/>
  <g transform="translate(24,24)">
    <g fill="white" transform="scale(0.78) translate(0,-1)">
      <!-- Nose -->
      <path d="M0,-24 L2,-18 L-2,-18 Z"/>
      <!-- Fuselage -->
      <path d="M2,-18 L3,-10 L3,-2 L3.5,6 L3,14 L2,19 L1,21 L-1,21 L-2,19 L-3,14 L-3.5,6 L-3,-2 L-3,-10 L-2,-18 Z"/>
      <!-- Cockpit -->
      <ellipse cx="0" cy="-12" rx="1.5" ry="3" fill="#F97316" opacity="0.6"/>
      <!-- Main wings - wider and bolder -->
      <path d="M3,-3 L20,6 L21,9 L19,9.5 L4,3 Z"/>
      <path d="M-3,-3 L-20,6 L-21,9 L-19,9.5 L-4,3 Z"/>
      <!-- Wing tips -->
      <path d="M20,6 L22,5 L21,9 Z"/>
      <path d="M-20,6 L-22,5 L-21,9 Z"/>
      <!-- Horizontal stabilizers -->
      <path d="M2.5,15 L12,20 L12,22 L10,21.5 L2,18 Z"/>
      <path d="M-2.5,15 L-12,20 L-12,22 L-10,21.5 L-2,18 Z"/>
      <!-- Vertical tail fins -->
      <path d="M1.5,16 L3.5,22 L2.5,23 L1,20 Z"/>
      <path d="M-1.5,16 L-3.5,22 L-2.5,23 L-1,20 Z"/>
      <!-- Engine nozzle -->
      <path d="M1.5,21 L1.8,24 L-1.8,24 L-1.5,21 Z" opacity="0.8"/>
      <!-- Intake details -->
      <rect x="-4" y="0" width="1.2" height="3" rx="0.5" opacity="0.5"/>
      <rect x="2.8" y="0" width="1.2" height="3" rx="0.5" opacity="0.5"/>
    </g>
  </g>
</svg>

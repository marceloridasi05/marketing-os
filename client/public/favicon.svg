      <!-- Main wings -->
      <path d="M2,-2 L18,8 L18,10 L16,10 L3,4 Z"/>
      <path d="M-2,-2 L-18,8 L-18,10 L-16,10 L-3,4 Z"/>
      <!-- Tail wings -->
      <path d="M2,16 L10,22 L10,23.5 L9,23 L1.5,20 Z"/>
      <path d="M-2,16 L-10,22 L-10,23.5 L-9,23 L-1.5,20 Z"/>

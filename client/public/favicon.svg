      <!-- Fuselage -->
      <path d="M0,-22 L2.5,-14 L2,-2 L3,8 L2,18 L1,22 L-1,22 L-2,18 L-3,8 L-2,-2 L-2.5,-14 Z"/>
      <!-- Nose cone -->
